[workspace]
members  = ["crates/rpstate", "crates/rpstate-macros"]
resolver = "2"

[workspace.dependencies]
# internal
rpstate-macros = { path = "crates/rpstate-macros" }

# external
anyhow      = "1.0.102"
arc-swap    = "1.9.1"
bytes       = "1"
inventory   = "0.3.24"
paste       = "1.0.15"
petgraph    = "0.8.3"
redb        = "4.1.0"
rmp-serde   = "1.3.1"
serde       = { version = "1.0.228", features = ["derive"] }
serde_json  = "1"
smol_str    = "0.3.6"
thiserror   = "2.0.18"
tracing     = "0.1.44"

# proc-macro
darling     = "0.23.0"
proc-macro2 = "1.0.106"
quote       = "1.0.45"
syn         = { version = "2.0.117", features = ["full"] }

# dev
criterion   = "0.8.2"
macrotest   = "1.2.1"
proptest    = "1.11.0"
rand        = "0.9.4"
rayon       = "1.12.0"
trybuild    = "1.0.116"
