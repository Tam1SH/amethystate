[package]
name = "tauri-leptos"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

default-run = "tauri-leptos"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "tauri_leptos_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-amethystate = { path = "../../../crates/tauri/tauri-plugin-amethystate" }

serde = { version = "1", features = ["derive"] }
serde_json = "1"

amethystate-codegen = { path = "../../../crates/tauri/amethystate-codegen", features = ["leptos"] }
amethystate = { path = "../../../crates/main/amethystate" }

shared = { path = "../shared" }


[[bin]]
name = "codegen"
path = "bin/codegen.rs"
