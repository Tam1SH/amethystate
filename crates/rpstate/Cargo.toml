[package]
name = "rpstate"
version = "0.1.0"
edition = "2024"

[features]
default = ["redb"]
json = ["dep:serde_json", "dep:anyhow"]
redb = ["dep:redb", "dep:rmp-serde", "dep:anyhow"]

[dependencies]
arc-swap = "1.9.1"
rpstate-macros = { workspace = true }
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
anyhow = { version = "1", optional = true }
serde_json = { version = "1", optional = true }
redb = { workspace = true, optional = true }
rmp-serde = { workspace = true, optional = true }
thiserror.workspace = true
petgraph.workspace = true
[dev-dependencies]
proptest = "1.11.0"